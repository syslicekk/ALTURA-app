<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>ASCEND — streak fortress</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000000;
      font-family: 'Inter', -apple-system, 'SF Pro Text', system-ui, sans-serif;
      color: #EDEDED;
      padding: 1.5rem 1rem 2.5rem;
      line-height: 1.4;
      overflow-x: hidden;
      width: 100%;
    }

    .tracker {
      max-width: 900px;
      margin: 0 auto;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }
    ::-webkit-scrollbar-thumb {
      background: #2c2c2c;
      border-radius: 8px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #141414;
      padding-bottom: 0.8rem;
    }

    .logo-area h1 {
      font-family: 'Montserrat', 'Century Gothic', 'Futura', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1.5px;
      background: linear-gradient(135deg, #FFFFFF 30%, #A0A0A0 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-transform: uppercase;
    }
    .logo-area p {
      font-size: 0.7rem;
      letter-spacing: 0.5px;
      color: #5e5e5e;
      margin-top: 4px;
    }

    /* Minimal streak display */
    .streak-duo {
      display: flex;
      gap: 0.8rem;
      background: #080808;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      border: 0.5px solid #222;
    }
    .streak-item {
      text-align: center;
    }
    .streak-label {
      font-size: 0.55rem;
      text-transform: uppercase;
      color: #8f8f8f;
      letter-spacing: 0.5px;
    }
    .streak-number {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.2;
      color: #FFFFFF;
    }
    .best-number {
      color: #FFD966;
    }

    /* Current date bubble */
    .date-bubble {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #0A0A0A;
      border: 1px solid #222;
      border-radius: 40px;
      padding: 0.3rem 1rem;
      margin-bottom: 1rem;
      width: fit-content;
    }
    .date-bubble span {
      font-size: 0.75rem;
      font-weight: 450;
      color: #CCCCCC;
      letter-spacing: 0.3px;
    }

    .progress-card {
      background: #0A0A0A;
      border-radius: 2rem;
      padding: 1.4rem 1.6rem;
      margin-bottom: 1.8rem;
      border: 1px solid #1C1C1C;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      font-weight: 500;
      font-size: 0.85rem;
      color: #C0C0C0;
      margin-bottom: 0.6rem;
    }
    .bar-bg {
      background: #181818;
      border-radius: 40px;
      height: 10px;
      overflow: hidden;
    }
    .bar-fill {
      background: #FFFFFF;
      width: 0%;
      height: 100%;
      border-radius: 40px;
      transition: width 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .quote-section {
      margin-top: 1rem;
      padding-top: 0.7rem;
      border-top: 1px dashed #202020;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .motivation-quote {
      font-size: 0.8rem;
      font-style: italic;
      color: #BBBBBB;
    }
    .quote-author {
      font-size: 0.7rem;
      color: #6A6A6A;
    }

    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0.5rem 0 1rem;
    }
    .nav-btn {
      background: #0C0C0C;
      border: 1px solid #292929;
      width: 42px;
      height: 42px;
      border-radius: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      cursor: pointer;
      transition: 0.15s;
      color: #E0E0E0;
      line-height: 1;
    }
    .nav-btn:hover {
      background: #181818;
    }
    @media (hover: hover) {
      .nav-btn:hover {
        border-color: #4A4A4A;
      }
      .habit-row:hover {
        background: #111111;
      }
    }
    .month-label {
      background: #070707;
      padding: 0.4rem 1.3rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 1rem;
      border: 1px solid #242424;
      cursor: pointer;
      transition: 0.1s;
    }
    .month-label:hover {
      background: #121212;
      border-color: #3A3A3A;
    }

    /* Month selector modal */
    .month-selector-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.15s;
      z-index: 1300;
    }
    .month-selector-modal.active {
      visibility: visible;
      opacity: 1;
    }
    .month-selector-card {
      background: #0D0D0D;
      border-radius: 2rem;
      padding: 1.5rem;
      width: 85%;
      max-width: 320px;
      border: 1px solid #2E2E2E;
    }
    .month-selector-card h3 {
      margin-bottom: 1rem;
      font-size: 1.1rem;
      font-weight: 500;
    }
    .year-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .year-nav button {
      background: #1A1A1A;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 36px;
      color: white;
      cursor: pointer;
      font-size: 1.2rem;
    }
    .year-display {
      font-weight: 600;
      font-size: 1.1rem;
    }
    .months-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.2rem;
    }
    .month-option {
      background: #151515;
      padding: 10px;
      text-align: center;
      border-radius: 1rem;
      cursor: pointer;
      transition: 0.1s;
      font-size: 0.85rem;
    }
    .month-option:hover {
      background: #252525;
    }
    .month-option.selected {
      background: #FFFFFF;
      color: #000000;
    }
    .close-month-btn {
      width: 100%;
      background: #252525;
      border: none;
      padding: 10px;
      border-radius: 1rem;
      color: white;
      cursor: pointer;
    }

    .calendar-container {
      background: #030303;
      border-radius: 2rem;
      padding: 1rem;
      border: 1px solid #1C1C1C;
      margin-bottom: 2rem;
    }
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 0.7rem;
      font-weight: 500;
      color: #6A6A6A;
      margin-bottom: 0.8rem;
    }
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .day-cell {
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 480;
      cursor: pointer;
      transition: all 0.12s;
      color: #DDD;
      background: #0C0C0C;
      border: 1px solid #232323;
    }
    .day-cell.future-day {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(0.2);
    }
    .day-cell.today {
      border: 2px solid #FFD966;
      font-weight: 700;
    }
    .day-cell:active {
      transform: scale(0.97);
    }

    .habits-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0.8rem 0 1.2rem;
    }
    .habits-header h2 {
      font-size: 1.2rem;
      font-weight: 520;
    }
    .add-btn {
      background: #0C0C0C;
      border: 1px solid #2C2C2C;
      width: 42px;
      height: 42px;
      border-radius: 42px;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.15s;
      color: white;
      line-height: 1;
      padding-bottom: 2px;
    }
    .add-btn:active {
      transform: scale(0.96);
    }
    .habits-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .habit-row {
      background: #0A0A0A;
      border: 1px solid #202020;
      border-radius: 1.3rem;
      padding: 0.9rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: 0.1s;
    }
    .habit-left {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
    }
    .habit-check {
      width: 22px;
      height: 22px;
      accent-color: #000;
      cursor: pointer;
      filter: invert(1);
    }
    .habit-name {
      font-size: 0.95rem;
      font-weight: 460;
    }
    .habit-name.done {
      text-decoration: line-through;
      color: #6A6A6A;
    }
    .delete-habit {
      background: none;
      border: none;
      color: #5C5C5C;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 6px;
      border-radius: 30px;
      transition: 0.1s;
    }
    .delete-habit:active {
      background: #1E1111;
      color: #FF7A5C;
    }
    .empty-message {
      text-align: center;
      padding: 2rem;
      color: #5E5E5E;
      background: #080808;
      border-radius: 1.5rem;
      border: 1px dashed #262626;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.94);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.12s;
      z-index: 1200;
    }
    .modal.active {
      visibility: visible;
      opacity: 1;
    }
    .modal-card {
      background: #0D0D0D;
      border-radius: 2rem;
      padding: 1.6rem;
      width: 88%;
      max-width: 340px;
      border: 1px solid #2E2E2E;
    }
    .modal-card input {
      width: 100%;
      padding: 14px;
      background: #040404;
      border: 1px solid #2D2D2D;
      border-radius: 1.2rem;
      color: white;
      margin: 0.8rem 0;
      font-size: 16px;
    }
    .modal-card input:focus {
      outline: none;
      border-color: #FFFFFF;
    }
    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .modal-buttons button {
      background: #151515;
      padding: 8px 18px;
      border-radius: 2rem;
      border: none;
      color: #DDD;
      cursor: pointer;
    }
    .modal-buttons button.primary {
      background: #FFFFFF;
      color: #000000;
    }
    footer {
      text-align: center;
      font-size: 0.65rem;
      margin-top: 2.5rem;
      color: #2C2C2C;
    }
    button, .habit-check, .delete-habit, .add-btn, .nav-btn, .day-cell {
      cursor: pointer;
      user-select: none;
    }
    @media (max-width: 768px) {
      body {
        padding: 1rem 0.8rem 2rem;
      }
      .day-cell {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
<div class="tracker">
  <div class="top-bar">
    <div class="logo-area">
      <h1>ASCEND</h1>
      <p>relentless consistency</p>
    </div>
    <div class="streak-duo">
      <div class="streak-item">
        <div class="streak-label">current</div>
        <div class="streak-number" id="currentStreak">0</div>
      </div>
      <div class="streak-item">
        <div class="streak-label">best</div>
        <div class="streak-number best-number" id="bestStreak">0</div>
      </div>
    </div>
  </div>

  <!-- Current date bubble -->
  <div class="date-bubble" id="currentDateBubble">
    <span></span>
  </div>

  <div class="progress-card">
    <div class="progress-header">
      <span>today's progress</span>
      <span id="completionPercent">0%</span>
    </div>
    <div class="bar-bg">
      <div class="bar-fill" id="progressFill"></div>
    </div>
    <div class="quote-section">
      <div class="motivation-quote" id="dailyQuote">“Stay hard.”</div>
      <div class="quote-author" id="quoteAuthor">— David Goggins</div>
    </div>
  </div>

  <div class="month-nav">
    <button class="nav-btn" id="prevMonthBtn">←</button>
    <span class="month-label" id="monthYearLabel">April 2026</span>
    <button class="nav-btn" id="nextMonthBtn">→</button>
  </div>
  <div class="calendar-container">
    <div class="weekdays"><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span></div>
    <div class="days-grid" id="calendarGrid"></div>
  </div>

  <div class="habits-header">
    <h2>daily rituals</h2>
    <button class="add-btn" id="openModalBtn">+</button>
  </div>
  <div id="habitsListContainer" class="habits-list"></div>
  <footer>✓ 100% = pure white · past completions stay complete · streak unaffected by new habits</footer>
</div>

<!-- Month selector modal -->
<div id="monthSelectorModal" class="month-selector-modal">
  <div class="month-selector-card">
    <h3>select month</h3>
    <div class="year-nav">
      <button id="yearPrevBtn">←</button>
      <span class="year-display" id="yearDisplay">2026</span>
      <button id="yearNextBtn">→</button>
    </div>
    <div class="months-grid" id="monthsGrid"></div>
    <button class="close-month-btn" id="closeMonthSelector">close</button>
  </div>
</div>

<div id="habitModal" class="modal">
  <div class="modal-card">
    <h3>new ritual</h3>
    <input type="text" id="habitNameInput" placeholder="e.g., 5am run, cold shower" autocomplete="off">
    <div class="modal-buttons">
      <button id="cancelModalBtn">cancel</button>
      <button id="confirmAddBtn" class="primary">add</button>
    </div>
  </div>
</div>

<script>
  // ---------- DATA ----------
  let habits = [];
  let completions = {};
  let bestStreakOverall = 0;
  let currentViewYear = new Date().getFullYear();
  let currentViewMonth = new Date().getMonth();
  let selectorYear = currentViewYear;

  function getTodayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function isFutureDate(dateKey) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const [year, month, day] = dateKey.split('-').map(Number);
    const targetDate = new Date(year, month-1, day);
    targetDate.setHours(0, 0, 0, 0);
    return targetDate > today;
  }

  function getDayCompletionPercent(dateKey) {
    if (!habits.length) return 0;
    if (isFutureDate(dateKey)) return 0;
    const dayMap = completions[dateKey] || {};
    let done = 0;
    for (let h of habits) if (dayMap[h.id]) done++;
    return (done / habits.length) * 100;
  }

  function isDayFullyComplete(dateKey) {
    if (!habits.length || isFutureDate(dateKey)) return false;
    return getDayCompletionPercent(dateKey) === 100;
  }

  function getCellGradient(percent) {
    if (habits.length === 0) return '#0C0C0C';
    const intensity = Math.floor(percent);
    const darkVal = 12;
    const lightVal = 180;
    const mix = darkVal + (intensity / 100) * (lightVal - darkVal);
    const val = Math.floor(mix);
    return `rgb(${val}, ${val}, ${val})`;
  }

  function addHabit(name) {
    const trimmed = name.trim();
    if (!trimmed) return false;
    const oldCount = habits.length;
    const newId = Date.now() + '-' + Math.random().toString(36).substr(2, 8);
    habits.push({ id: newId, name: trimmed });
    if (oldCount > 0) {
      for (let dateKey in completions) {
        if (isFutureDate(dateKey)) continue;
        const dayMap = completions[dateKey] || {};
        let oldHabitsCompleted = 0;
        for (let i = 0; i < oldCount; i++) {
          if (dayMap[habits[i].id]) oldHabitsCompleted++;
        }
        if (oldHabitsCompleted === oldCount) {
          completions[dateKey][newId] = true;
        }
      }
    }
    renderAll();
    return true;
  }

  function computeCurrentStreak() {
    if (!habits.length) return 0;
    let streak = 0;
    let cursor = new Date();
    cursor.setHours(0,0,0,0);
    for (let i = 0; i < 5000; i++) {
      const y = cursor.getFullYear();
      const m = String(cursor.getMonth()+1).padStart(2,'0');
      const d = String(cursor.getDate()).padStart(2,'0');
      const key = `${y}-${m}-${d}`;
      if (getDayCompletionPercent(key) === 100) streak++;
      else break;
      cursor.setDate(cursor.getDate() - 1);
    }
    return streak;
  }

  function updateBestStreak() {
    const current = computeCurrentStreak();
    if (current > bestStreakOverall) {
      bestStreakOverall = current;
      saveToLocalStorage();
    }
    document.getElementById('bestStreak').innerText = bestStreakOverall;
    document.getElementById('currentStreak').innerText = current;
    return current;
  }

  const QUOTES = [
    { text: "You are stopping you. You are giving up on you.", author: "David Goggins" },
    { text: "Don't stop when you're tired. Stop when you're done.", author: "David Goggins" },
    { text: "The most important conversations you'll ever have are the ones with yourself.", author: "Joe Rogan" },
    { text: "Be obsessed or be average.", author: "David Goggins" },
    { text: "There is no finish line. There is only the next battle.", author: "Jocko Willink" },
    { text: "Comfort is a slow death.", author: "David Goggins" },
    { text: "You have to be willing to be uncomfortable to level up.", author: "Joe Rogan" },
    { text: "Accountability is the bridge between goals and results.", author: "Cameron Hanes" },
    { text: "The only easy day was yesterday.", author: "Navy SEAL mantra" },
    { text: "Stay hard. Stay dangerous. Stay grateful.", author: "David Goggins" }
  ];

  function getDailyQuote() {
    const today = new Date();
    const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
    const index = dayOfYear % QUOTES.length;
    return QUOTES[index];
  }

  function updateQuoteUI() {
    const quote = getDailyQuote();
    document.getElementById('dailyQuote').innerHTML = `“${quote.text}”`;
    document.getElementById('quoteAuthor').innerText = `— ${quote.author}`;
  }

  function updateCurrentDateBubble() {
    const now = new Date();
    const options = { weekday: 'short', month: 'short', day: 'numeric' };
    const dateStr = now.toLocaleDateString('en-US', options);
    document.getElementById('currentDateBubble').querySelector('span').innerText = dateStr;
  }

  function toggleHabitToday(habitId, checked) {
    const todayKey = getTodayKey();
    if (!completions[todayKey]) completions[todayKey] = {};
    if (checked) completions[todayKey][habitId] = true;
    else delete completions[todayKey][habitId];
    if (Object.keys(completions[todayKey]).length === 0) delete completions[todayKey];
    renderAll();
  }

  function toggleFullDayCompletion(dateKey) {
    if (isFutureDate(dateKey)) return;
    if (!habits.length) return;
    const currentlyFull = isDayFullyComplete(dateKey);
    if (!completions[dateKey]) completions[dateKey] = {};
    if (currentlyFull) {
      for (let h of habits) delete completions[dateKey][h.id];
      if (Object.keys(completions[dateKey]).length === 0) delete completions[dateKey];
    } else {
      for (let h of habits) completions[dateKey][h.id] = true;
    }
    renderAll();
  }

  function renderCalendar() {
    const firstDay = new Date(currentViewYear, currentViewMonth, 1);
    let startWeekday = firstDay.getDay();
    let startOffset = startWeekday === 0 ? 6 : startWeekday - 1;
    const daysInMonth = new Date(currentViewYear, currentViewMonth + 1, 0).getDate();
    const prevMonthDays = new Date(currentViewYear, currentViewMonth, 0).getDate();
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';
    const todayObj = new Date();
    const todayY = todayObj.getFullYear(), todayM = todayObj.getMonth(), todayD = todayObj.getDate();

    for (let i = 0; i < 42; i++) {
      let cellDate, cellYear, cellMonth, isCurrent = true;
      if (i < startOffset) {
        cellDate = prevMonthDays - (startOffset - i) + 1;
        cellYear = currentViewMonth === 0 ? currentViewYear - 1 : currentViewYear;
        cellMonth = currentViewMonth === 0 ? 11 : currentViewMonth - 1;
        isCurrent = false;
      } else if (i >= startOffset + daysInMonth) {
        let nextIdx = i - (startOffset + daysInMonth);
        cellDate = nextIdx + 1;
        cellYear = currentViewMonth === 11 ? currentViewYear + 1 : currentViewYear;
        cellMonth = currentViewMonth === 11 ? 0 : currentViewMonth + 1;
        isCurrent = false;
      } else {
        cellDate = i - startOffset + 1;
        cellYear = currentViewYear;
        cellMonth = currentViewMonth;
        isCurrent = true;
      }
      const monthStr = String(cellMonth + 1).padStart(2,'0');
      const dayStr = String(cellDate).padStart(2,'0');
      const dateKey = `${cellYear}-${monthStr}-${dayStr}`;
      const percent = getDayCompletionPercent(dateKey);
      const bgColor = getCellGradient(percent);
      const isFuture = isFutureDate(dateKey);
      const isToday = (cellYear === todayY && cellMonth === todayM && cellDate === todayD);
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      if (isFuture) cell.classList.add('future-day');
      if (isToday) cell.classList.add('today');
      if (!isCurrent) cell.classList.add('other-month');
      cell.style.background = bgColor;
      cell.style.border = isToday ? '2px solid #FFD966' : '1px solid #232323';
      cell.innerText = cellDate;
      if (!isFuture) {
        cell.addEventListener('click', (e) => {
          e.stopPropagation();
          if (habits.length === 0) return;
          toggleFullDayCompletion(dateKey);
        });
      } else {
        cell.style.cursor = 'not-allowed';
      }
      grid.appendChild(cell);
    }
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('monthYearLabel').innerText = `${monthNames[currentViewMonth]} ${currentViewYear}`;
  }

  function renderHabits() {
    const container = document.getElementById('habitsListContainer');
    if (!habits.length) {
      container.innerHTML = '<div class="empty-message">⟡ add a ritual to begin ⟡</div>';
      return;
    }
    const todayKey = getTodayKey();
    const todayData = completions[todayKey] || {};
    container.innerHTML = '';
    habits.forEach(habit => {
      const done = !!todayData[habit.id];
      const row = document.createElement('div');
      row.className = 'habit-row';
      row.innerHTML = `
        <div class="habit-left">
          <input type="checkbox" class="habit-check" data-id="${habit.id}" ${done ? 'checked' : ''}>
          <span class="habit-name ${done ? 'done' : ''}">${escapeHtml(habit.name)}</span>
        </div>
        <button class="delete-habit" data-id="${habit.id}">✕</button>
      `;
      const chk = row.querySelector('.habit-check');
      chk.addEventListener('change', () => toggleHabitToday(habit.id, chk.checked));
      const del = row.querySelector('.delete-habit');
      del.addEventListener('click', () => {
        habits = habits.filter(h => h.id !== habit.id);
        for (let day in completions) {
          if (completions[day] && completions[day][habit.id]) delete completions[day][habit.id];
          if (completions[day] && Object.keys(completions[day]).length === 0) delete completions[day];
        }
        renderAll();
      });
      container.appendChild(row);
    });
  }

  function updateProgressAndStreak() {
    const pct = getDayCompletionPercent(getTodayKey());
    document.getElementById('completionPercent').innerText = `${Math.floor(pct)}%`;
    document.getElementById('progressFill').style.width = `${pct}%`;
    updateBestStreak();
  }

  function renderAll() {
    renderCalendar();
    renderHabits();
    updateProgressAndStreak();
    updateQuoteUI();
    updateCurrentDateBubble();
    saveToLocalStorage();
  }

  // Month selector logic
  function openMonthSelector() {
    selectorYear = currentViewYear;
    document.getElementById('yearDisplay').innerText = selectorYear;
    renderMonthGrid();
    document.getElementById('monthSelectorModal').classList.add('active');
  }
  function closeMonthSelector() {
    document.getElementById('monthSelectorModal').classList.remove('active');
  }
  function renderMonthGrid() {
    const grid = document.getElementById('monthsGrid');
    const monthNamesShort = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    grid.innerHTML = '';
    monthNamesShort.forEach((name, idx) => {
      const btn = document.createElement('div');
      btn.className = 'month-option';
      if (selectorYear === currentViewYear && idx === currentViewMonth) btn.classList.add('selected');
      btn.innerText = name;
      btn.addEventListener('click', () => {
        currentViewYear = selectorYear;
        currentViewMonth = idx;
        renderCalendar();
        closeMonthSelector();
        saveToLocalStorage();
      });
      grid.appendChild(btn);
    });
  }

  const STORAGE_KEY = 'ascend_habit_tracker';
  function saveToLocalStorage() {
    const data = { habits, completions, bestStreakOverall, currentViewYear, currentViewMonth };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }
  function loadFromLocalStorage() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      try {
        const data = JSON.parse(raw);
        if (data.habits) habits = data.habits;
        if (data.completions) completions = data.completions;
        if (typeof data.bestStreakOverall === 'number') bestStreakOverall = data.bestStreakOverall;
        if (typeof data.currentViewYear === 'number') currentViewYear = data.currentViewYear;
        if (typeof data.currentViewMonth === 'number') currentViewMonth = data.currentViewMonth;
      } catch(e) {}
    }
    if (habits.length === 0) {
      habits = [
        { id: 'demo1', name: '4am wake up' },
        { id: 'demo2', name: 'cold exposure' },
        { id: 'demo3', name: '90min deep work' }
      ];
      const todayKey = getTodayKey();
      if (!completions[todayKey]) completions[todayKey] = {};
      completions[todayKey]['demo1'] = true;
      const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
      const yKey = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
      if (!completions[yKey]) completions[yKey] = {};
      completions[yKey]['demo1'] = true;
      completions[yKey]['demo2'] = true;
      saveToLocalStorage();
    }
    if (bestStreakOverall === undefined || bestStreakOverall === 0) bestStreakOverall = computeCurrentStreak();
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // Modal handlers
  const modal = document.getElementById('habitModal');
  const openBtn = document.getElementById('openModalBtn');
  const cancelBtn = document.getElementById('cancelModalBtn');
  const confirmBtn = document.getElementById('confirmAddBtn');
  const habitInput = document.getElementById('habitNameInput');
  function openModal() { modal.classList.add('active'); habitInput.value = ''; habitInput.focus(); }
  function closeModal() { modal.classList.remove('active'); }
  openBtn.addEventListener('click', openModal);
  cancelBtn.addEventListener('click', closeModal);
  confirmBtn.addEventListener('click', () => {
    if (addHabit(habitInput.value)) closeModal();
    else { habitInput.placeholder = 'need a name'; habitInput.style.borderColor = '#FF7A5C'; setTimeout(() => habitInput.style.borderColor = '#2D2D2D', 800); }
  });
  habitInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') confirmBtn.click(); });
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

  // Navigation
  document.getElementById('prevMonthBtn').addEventListener('click', () => {
    if (currentViewMonth === 0) { currentViewMonth = 11; currentViewYear--; }
    else currentViewMonth--;
    renderCalendar();
    saveToLocalStorage();
  });
  document.getElementById('nextMonthBtn').addEventListener('click', () => {
    if (currentViewMonth === 11) { currentViewMonth = 0; currentViewYear++; }
    else currentViewMonth++;
    renderCalendar();
    saveToLocalStorage();
  });
  document.querySelector('.month-label').addEventListener('click', openMonthSelector);
  document.getElementById('closeMonthSelector').addEventListener('click', closeMonthSelector);
  document.getElementById('yearPrevBtn').addEventListener('click', () => {
    selectorYear--;
    document.getElementById('yearDisplay').innerText = selectorYear;
    renderMonthGrid();
  });
  document.getElementById('yearNextBtn').addEventListener('click', () => {
    selectorYear++;
    document.getElementById('yearDisplay').innerText = selectorYear;
    renderMonthGrid();
  });
  document.getElementById('monthSelectorModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('monthSelectorModal')) closeMonthSelector();
  });

  loadFromLocalStorage();
  renderAll();
  let lastDate = getTodayKey();
  setInterval(() => {
    const newDate = getTodayKey();
    if (newDate !== lastDate) {
      lastDate = newDate;
      renderHabits();
      updateProgressAndStreak();
      renderCalendar();
      updateCurrentDateBubble();
      saveToLocalStorage();
    }
  }, 30000);
</script>
</body>
</html>
